<div class="min-h-screen bg-slate-900 text-slate-200 font-sans p-4 md:p-8">
  
  <!-- Header -->
  <header class="max-w-7xl mx-auto mb-8">
    <div class="flex items-center gap-3">
      <div class="bg-blue-500/20 p-2.5 rounded-lg border border-blue-500/30">
        <svg class="w-6 h-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" focusable="false">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Incident Dashboard</h1>
        <p class="text-sm text-slate-400">Monitor and manage system anomalies in real-time.</p>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto">
    <!-- Filters -->
    <app-filters 
      [filters]="store.filters()"
      (filtersChange)="onFiltersChange($event)">
    </app-filters>

    <!-- Main Content Area -->
    <div class="flex flex-col lg:flex-row gap-6 relative">
      
      <!-- Master List View -->
      <div class="flex-1 transition-all" [ngClass]="{'lg:w-1/2 xl:w-2/3': store.selectedIncident()}">
        <app-incident-list
          [incidents]="store.filteredIncidents()"
          [isLoading]="store.isLoading()"
          [error]="store.error()"
          [selectedId]="store.selectedIncidentId()"
          (selectIncident)="onSelectIncident($event)"
          (retry)="store.loadIncidents()"
          (loadMore)="store.loadNextPage()">
        </app-incident-list>
      </div>

      <!-- Detail View Panel (Lazy loaded via @defer for performance demonstration) -->
      @if (store.selectedIncident()) {
        <div class="lg:w-1/2 xl:w-1/3 lg:sticky lg:top-8 lg:h-[calc(100vh-8rem)]">
          @defer (on timer(100ms)) {
            <app-incident-details
              [incident]="store.selectedIncident()"
              (updateStatus)="onUpdateStatus($event.id, $event.status)"
              (close)="onSelectIncident(null)">
            </app-incident-details>
          } @placeholder {
            <div class="bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-xl h-full flex items-center justify-center animate-pulse">
              <div class="w-8 h-8 rounded-full border-4 border-slate-600 border-t-blue-500 animate-spin"></div>
            </div>
          }
        </div>
      }

    </div>
  </main>

</div>
