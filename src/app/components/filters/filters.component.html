<div class="bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-xl p-4 mb-6 shadow-xl flex flex-wrap gap-4 items-center">
  
  <div class="flex-1 min-w-[200px]">
    <label class="sr-only" for="search">Search Incidents</label>
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" focusable="false">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input 
        id="search"
        type="text" 
        [value]="filters().searchTerm"
        (input)="onFilterChange('searchTerm', $any($event.target).value)"
        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
        placeholder="Search by title or ID..."
      />
    </div>
  </div>

  <div class="w-full sm:w-auto flex gap-4">
    <select 
      [value]="filters().status"
      (change)="onFilterChange('status', $any($event.target).value)"
      class="bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer">
      <option value="">All Statuses</option>
      @for (status of statuses; track status) {
        <option [value]="status">{{ status }}</option>
      }
    </select>

    <select 
      [value]="filters().severity"
      (change)="onFilterChange('severity', $any($event.target).value)"
      class="bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer">
      <option value="">All Severities</option>
      @for (severity of severities; track severity) {
        <option [value]="severity">{{ severity }}</option>
      }
    </select>
    
    <select 
      [value]="filters().service"
      (change)="onFilterChange('service', $any($event.target).value)"
      class="bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer">
      <option value="">All Services</option>
      @for (service of services; track service) {
        <option [value]="service">{{ service }}</option>
      }
    </select>
  </div>

</div>
