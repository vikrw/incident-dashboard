<div class="bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-xl p-4 mb-6 shadow-xl flex flex-wrap gap-4 items-center">
  
  <div class="flex-1 min-w-[200px]">
    <label class="sr-only" for="search">Search Incidents</label>
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input 
        id="search"
        type="text" 
        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
        placeholder="Search by title or ID..."
        [ngModel]="filters().searchTerm"
        (ngModelChange)="onFilterChange('searchTerm', $event)"
      />
    </div>
  </div>

  <div class="w-full sm:w-auto flex gap-4">
    <select 
      class="bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer"
      [ngModel]="filters().status"
      (ngModelChange)="onFilterChange('status', $event)">
      <option value="">All Statuses</option>
      <option value="Open">Open</option>
      <option value="In Progress">In Progress</option>
      <option value="Resolved">Resolved</option>
      <option value="Closed">Closed</option>
    </select>

    <select 
      class="bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer"
      [ngModel]="filters().severity"
      (ngModelChange)="onFilterChange('severity', $event)">
      <option value="">All Severities</option>
      <option value="Critical">Critical</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
    
    <select 
      class="bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer"
      [ngModel]="filters().service"
      (ngModelChange)="onFilterChange('service', $event)">
      <option value="">All Services</option>
      <option value="Database API">Database API</option>
      <option value="Auth Service">Auth Service</option>
      <option value="Frontend">Frontend</option>
      <option value="Payment Service">Payment Service</option>
      <option value="Worker Pool">Worker Pool</option>
    </select>
  </div>

</div>
